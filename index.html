<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AHM Anjou — Coach Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ice:     #e8f4fd;
      --dark:    #0a0f1e;
      --navy:    #0d1b3e;
      --blue:    #1a3a8f;
      --accent:  #e8320a;
      --gold:    #f5a623;
      --white:   #ffffff;
      --muted:   #8a9bbf;
      --surface: #111827;
      --card:    #1a2340;
      --border:  #243058;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── RINK TEXTURE BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(26,58,143,0.04) 60px, rgba(26,58,143,0.04) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(26,58,143,0.04) 60px, rgba(26,58,143,0.04) 61px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, var(--navy) 0%, #0d1f4e 100%);
      border-bottom: 3px solid var(--accent);
      padding: 0 2rem;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-puck {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 0 24px rgba(232,50,10,0.5);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 24px rgba(232,50,10,0.5); }
      50%       { box-shadow: 0 0 40px rgba(232,50,10,0.8); }
    }

    .logo-text h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
    }

    .logo-text span {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .sync-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── NAV TABS ── */
    nav {
      position: relative; z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
    }

    .nav-tab {
      padding: 1rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-tab:hover { color: var(--white); }

    .nav-tab.active {
      color: var(--white);
      border-bottom-color: var(--accent);
    }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative; z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .section { display: none; }
    .section.active { display: block; }

    /* ── CATEGORY FILTER ── */
    .cat-filter {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .cat-btn {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-btn:hover, .cat-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }

    /* ── CARDS ── */
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 1.5rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge-cat    { background: rgba(26,58,143,0.4); border: 1px solid var(--blue); color: #7fa8f0; }
    .badge-high   { background: rgba(232,50,10,0.2);  border: 1px solid var(--accent); color: #f87171; }
    .badge-medium { background: rgba(245,166,35,0.2); border: 1px solid var(--gold);   color: var(--gold); }
    .badge-low    { background: rgba(34,197,94,0.2);  border: 1px solid #22c55e; color: #4ade80; }

    /* ── MATCH CARD ── */
    .match-card {
      border-left: 4px solid var(--blue);
    }

    .match-card.next-game {
      border-left-color: var(--accent);
      background: linear-gradient(135deg, #1a2340 0%, #1a1a2e 100%);
    }

    .match-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 1rem 0;
    }

    .team-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .vs { color: var(--muted); font-size: 0.9rem; font-weight: 600; }

    .match-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .match-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #c42a08; transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-outline:hover {
      border-color: var(--blue);
      color: var(--white);
    }

    /* ── STRATEGY DETAIL ── */
    .strategy-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      overflow-y: auto;
      padding: 2rem;
    }

    .strategy-modal.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal-box {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 860px;
      width: 100%;
      position: relative;
      animation: fadeUp 0.3s ease;
    }

    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--muted);
    }

    .modal-close:hover { color: var(--white); border-color: var(--accent); }

    .strategy-section {
      margin-bottom: 1.5rem;
    }

    .strategy-section h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .strategy-section h3::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .key-points {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .key-points li {
      display: flex;
      gap: 0.6rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .key-points li::before {
      content: '→';
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── PLAYER CARD ── */
    .player-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .player-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .player-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      min-width: 2.5rem;
      text-align: center;
    }

    .player-info { flex: 1; }
    .player-name { font-weight: 600; font-size: 0.95rem; }
    .player-pos  { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    .player-note { font-size: 0.85rem; color: #c0cce0; }

    /* ── STATS TABLE ── */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .stats-table th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .stats-table td {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(36,48,88,0.5);
    }

    .stats-table tr:hover td { background: rgba(26,58,143,0.1); }

    .stats-table tr.ahm-row td {
      color: var(--gold);
      font-weight: 600;
    }

    /* ── OVERVIEW STATS ── */
    .stat-boxes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem;
      text-align: center;
    }

    .stat-box-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }

    .stat-box-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.4rem;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem;
      color: var(--muted);
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOTIVATIONAL BANNER ── */
    .mot-banner {
      background: linear-gradient(135deg, var(--blue) 0%, #0d1b3e 100%);
      border: 1px solid rgba(26,58,143,0.5);
      border-radius: 10px;
      padding: 1rem 1.5rem;
      font-style: italic;
      color: #c0d4f0;
      font-size: 0.95rem;
      margin-top: 1rem;
    }

    .mot-banner strong { color: var(--gold); font-style: normal; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      main { padding: 1rem; }
      .grid-3, .grid-2 { grid-template-columns: 1fr; }
      .stat-boxes { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo-block">
      <div class="logo-puck">🏒</div>
      <div class="logo-text">

    <div style="margin-bottom:1.5rem">

        ⚡ Prochain match
      </h2>
      <div id="next-game-card"></div>
    </div>
    <div>
      <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem;">
        📋 Stratégies récentes
      </h2>
      <div class="grid-3" id="recent-strategies"></div>
    </div>
  </div>

  <!-- ── SCHEDULE ── -->
  <div id="schedule" class="section">
    <div class="cat-filter" id="schedule-filter"></div>
    <div class="grid-3" id="schedule-cards"></div>
  </div>

  <!-- ── STRATEGIES ── -->
  <div id="strategies" class="section">
    <div class="cat-filter" id="strat-filter"></div>
    <div class="grid-2" id="strategy-cards"></div>
  </div>

  <!-- ── OPPONENTS ── -->
  <div id="opponents" class="section">
    <div class="cat-filter" id="opp-filter"></div>
    <div class="grid-3" id="opponent-cards"></div>
  </div>

  <!-- ── STANDINGS ── -->
  <div id="standings" class="section">
    <div class="cat-filter" id="standing-filter"></div>
    <div id="standings-content"></div>
  </div>

</main>

<!-- STRATEGY MODAL -->
<div class="strategy-modal" id="strategy-modal">
  <div class="modal-box" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
</div>

let APP_DATA = { ...DEMO_DATA };

async function loadData() {
  for (const [key, path] of Object.entries(DATA_PATHS)) {
    try {
      const r = await fetch(path);
      if (r.ok) {
        APP_DATA[key] = await r.json();
        console.log(`✅ ${key} chargé depuis ${path}`);
      }
    } catch (e) {
      console.log(`⚠️ ${key} non disponible — mode démo`);
    }
  }

  const syncTime = APP_DATA.strategies?.generated_at
    ? new Date(APP_DATA.strategies.generated_at).toLocaleString('fr-CA', {dateStyle:'short', timeStyle:'short'})
    : 'Mode démo';

  document.getElementById('last-sync').textContent = `Dernière synchro : ${syncTime}`;
  renderAll();
}

// ════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// ════════════════════════════════════════════
//  RENDER FUNCTIONS
// ════════════════════════════════════════════

const CATS = ['Toutes', 'M7', 'M9', 'M11', 'M13', 'M15', 'M18'];

function buildCatFilter(containerId, onFilter) {
  const el = document.getElementById(containerId);
  CATS.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = function() {
      el.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      onFilter(cat === 'Toutes' ? null : cat);
    };
    el.appendChild(btn);
  });
}

function threatBadge(level) {
  const map = { 'faible': ['badge-low', '🟢 Faible'], 'moyen': ['badge-medium', '🟡 Moyen'], 'elevé': ['badge-high', '🔴 Élevé'] };
  const [cls, label] = map[level] || ['badge-cat', level];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── OVERVIEW ──
function renderOverview() {
  const strats = APP_DATA.strategies?.strategies || [];
  const upcoming = strats.filter(s => !s.error);

  document.getElementById('overview-stats').innerHTML = `
    <div class="stat-box"><div class="stat-box-value">${upcoming.length}</div><div class="stat-box-label">Matchs analysés</div></div>
    <div class="stat-box"><div class="stat-box-value">${upcoming.filter(s=>s.niveau_menace==='elevé').length}</div><div class="stat-box-label">Adversaires forts</div></div>
    <div class="stat-box"><div class="stat-box-value">${[...new Set(upcoming.map(s=>s.categorie))].length}</div><div class="stat-box-label">Catégories actives</div></div>
    <div class="stat-box"><div class="stat-box-value">${upcoming.reduce((a,s)=>(a+(s.joueurs_a_surveiller||[]).filter(p=>p.priorite==='haute').length), 0)}</div><div class="stat-box-label">Joueurs à surveiller</div></div>
  `;

  // Next game
  const sorted = [...upcoming].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const next = sorted[0];
  const ngEl = document.getElementById('next-game-card');
  if (next) {
    ngEl.innerHTML = `
      <div class="card match-card next-game">
        <div class="card-header">
          <span class="badge badge-cat">${next.categorie}</span>
          ${threatBadge(next.niveau_menace)}
        </div>
        <div class="match-teams">
          <span class="team-name" style="color:var(--gold)">AHM Anjou</span>
          <span class="vs">VS</span>
          <span class="team-name">${next.adversaire}</span>
        </div>
        <div class="match-meta">
          <span>📅 ${formatDate(next.date)}</span>
          ${next.heure ? `<span>⏰ ${next.heure}</span>` : ''}
          ${next.lieu  ? `<span>📍 ${next.lieu}</span>`  : ''}
        </div>
        <div style="margin-top:1rem">
          <button class="btn btn-primary" onclick="openStrategy('${next.match_id}')">Voir la stratégie complète →</button>
        </div>
      </div>`;
  }

  // Recent strategies
  const recEl = document.getElementById('recent-strategies');
  recEl.innerHTML = sorted.slice(0, 3).map(s => renderStratCard(s)).join('');
}

// ── SCHEDULE ──
function renderSchedule(filter = null) {
  const strats = (APP_DATA.strategies?.strategies || []).filter(s => !s.error);
  const items = filter ? strats.filter(s => s.categorie === filter) : strats;
  const el = document.getElementById('schedule-cards');
  if (!items.length) { el.innerHTML = emptyState('Aucun match trouvé'); return; }
  el.innerHTML = items.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(s => `
    <div class="card match-card">
      <div class="card-header">
        <span class="badge badge-cat">${s.categorie}</span>
        ${threatBadge(s.niveau_menace)}
      </div>
      <div class="match-teams">
        <div>
          <div style="font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.1em">AHM Anjou</div>
          <div class="team-name" style="color:var(--gold)">Anjou</div>
        </div>
        <span class="vs">VS</span>
        <div style="text-align:right">
          <div style="font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.1em">Adversaire</div>
          <div class="team-name">${s.adversaire}</div>
        </div>
      </div>
      <div class="match-meta">
        <span>📅 ${formatDate(s.date)}</span>
        ${s.heure ? `<span>⏰ ${s.heure}</span>` : ''}
        ${s.lieu  ? `<span>📍 ${s.lieu}</span>`  : ''}
      </div>
      <div style="margin-top:1rem;display:flex;gap:.75rem">
        <button class="btn btn-primary" onclick="openStrategy('${s.match_id}')">Stratégie →</button>
        <button class="btn btn-outline" onclick="showOpponent('${s.adversaire}', '${s.categorie}')">Profil adversaire</button>
      </div>
    </div>
  `).join('');
}

// ── STRATEGY CARDS ──
function renderStratCard(s) {
  const players = (s.joueurs_a_surveiller || []).filter(p => p.priorite === 'haute');
  return `
    <div class="card" style="cursor:pointer" onclick="openStrategy('${s.match_id}')">
      <div class="card-header">
        <span class="badge badge-cat">${s.categorie}</span>
        ${threatBadge(s.niveau_menace)}
      </div>
      <div class="card-title" style="margin:0.5rem 0">${s.adversaire}</div>
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem">📅 ${formatDate(s.date)}${s.lieu ? ` · ${s.lieu}` : ''}</div>
      <p style="font-size:.85rem;color:#c0cce0;line-height:1.5;margin-bottom:.75rem">${(s.resume_adversaire||'').substring(0,120)}…</p>
      ${players.length ? `<div style="font-size:.78rem;color:var(--gold)">⚠️ ${players.length} joueur${players.length>1?'s':''} prioritaire${players.length>1?'s':''} à surveiller</div>` : ''}
    </div>`;
}

function renderStrategies(filter = null) {
  const strats = (APP_DATA.strategies?.strategies || []).filter(s => !s.error);
  const items = filter ? strats.filter(s => s.categorie === filter) : strats;
  const el = document.getElementById('strategy-cards');
  if (!items.length) { el.innerHTML = emptyState('Aucune stratégie générée'); return; }
  el.innerHTML = items.map(s => renderStratCard(s)).join('');
}

// ── STRATEGY MODAL ──
function openStrategy(matchId) {
  const s = (APP_DATA.strategies?.strategies || []).find(x => x.match_id === matchId);
  if (!s) return;

  const players = s.joueurs_a_surveiller || [];
  const high    = players.filter(p => p.priorite === 'haute');
  const other   = players.filter(p => p.priorite !== 'haute');

  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>

    <div style="margin-bottom:1.5rem">
      <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:.75rem">
        <span class="badge badge-cat">${s.categorie}</span>
        ${threatBadge(s.niveau_menace)}
        ${s.confiance_analyse ? `<span style="font-size:.75rem;color:var(--muted)">Confiance IA : ${Math.round(s.confiance_analyse*100)}%</span>` : ''}
      </div>
      <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em">
        AHM Anjou <span style="color:var(--muted)">VS</span> ${s.adversaire}
      </h2>
      <div style="display:flex;gap:1.5rem;font-size:.82rem;color:var(--muted);margin-top:.5rem;flex-wrap:wrap">
        ${s.date  ? `<span>📅 ${formatDate(s.date)}</span>` : ''}
        ${s.heure ? `<span>⏰ ${s.heure}</span>` : ''}
        ${s.lieu  ? `<span>📍 ${s.lieu}</span>`  : ''}
      </div>
    </div>

    <div class="strategy-section">
      <h3>📋 Résumé adversaire</h3>
      <p style="font-size:.9rem;line-height:1.6;color:#c0cce0">${s.resume_adversaire || '—'}</p>
    </div>

    ${players.length ? `
    <div class="strategy-section">
      <h3>⚠️ Joueurs à surveiller</h3>
      <div class="player-grid">
        ${[...high, ...other].map(p => `
          <div class="player-item">
            <div class="player-number">#${p.numero || '?'}</div>
            <div class="player-info">
              <div class="player-name">${p.nom} <span style="font-size:.75rem;color:var(--muted)">· ${p.position}</span></div>
              <div class="player-pos">${priorityLabel(p.priorite)}</div>
              <div class="player-note">${p.raison}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem">
      <div class="strategy-section">
        <h3>⚔️ Offensive — ${s.strategie_offensive?.titre || ''}</h3>
        <ul class="key-points">
          ${(s.strategie_offensive?.points_cles||[]).map(p=>`<li>${p}</li>`).join('')}
        </ul>
        ${s.strategie_offensive?.formation_recommandee ? `<div style="margin-top:.75rem;font-size:.8rem;color:var(--gold)">Formation : ${s.strategie_offensive.formation_recommandee}</div>` : ''}
      </div>

      <div class="strategy-section">
        <h3>🛡️ Défensive — ${s.strategie_defensive?.titre || ''}</h3>
        <ul class="key-points">
          ${(s.strategie_defensive?.points_cles||[]).map(p=>`<li>${p}</li>`).join('')}
        </ul>
        ${s.strategie_defensive?.ajustements ? `<div style="margin-top:.75rem;font-size:.8rem;color:var(--muted)">${s.strategie_defensive.ajustements}</div>` : ''}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:.5rem">
      ${infoBox('🎯 Mises en jeu',       s.mises_en_jeu)}
      ${infoBox('➕ Avantage numérique', s.avantage_numerique)}
      ${infoBox('➖ Désavantage num.',   s.desavantage_numerique)}
    </div>

    ${s.message_motivationnel ? `<div class="mot-banner"><strong>Message aux joueurs :</strong> "${s.message_motivationnel}"</div>` : ''}
  `;

  document.getElementById('strategy-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('strategy-modal').classList.remove('open');
}

// ── OPPONENTS ──
function renderOpponents(filter = null) {
  const strats = (APP_DATA.strategies?.strategies || []).filter(s => !s.error);
  const items = filter ? strats.filter(s => s.categorie === filter) : strats;
  const el = document.getElementById('opponent-cards');

  if (!items.length) { el.innerHTML = emptyState('Aucun adversaire analysé'); return; }

  el.innerHTML = items.map(s => {
    const high = (s.joueurs_a_surveiller||[]).filter(p=>p.priorite==='haute');
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${s.adversaire}</div>
            <div style="font-size:.75rem;color:var(--muted);margin-top:.2rem">${s.categorie} · ${formatDate(s.date)}</div>
          </div>
          ${threatBadge(s.niveau_menace)}
        </div>
        <p style="font-size:.85rem;color:#c0cce0;line-height:1.5;margin-bottom:.75rem">${(s.resume_adversaire||'').substring(0,140)}…</p>
        ${high.length ? `
          <div style="margin-bottom:.75rem">
            <div style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem">Danger principal</div>
            ${high.slice(0,2).map(p=>`
              <div style="font-size:.82rem;display:flex;gap:.4rem;align-items:center;padding:.3rem 0;border-bottom:1px solid var(--border)">
                <span style="color:var(--gold);font-weight:700">#${p.numero||'?'}</span>
                <span>${p.nom}</span>
                <span style="color:var(--muted)">· ${p.position}</span>
              </div>`).join('')}
          </div>` : ''}
        <button class="btn btn-primary" onclick="openStrategy('${s.match_id}')">Plan de match complet →</button>
      </div>
    `;
  }).join('');
}

// ── STANDINGS ──
function renderStandings(filter = null) {
  const el = document.getElementById('standings-content');
  const cats = APP_DATA.opponents?.categories || {};
  const keys = filter ? [filter] : Object.keys(cats);

  if (!keys.length) {
    el.innerHTML = `<div class="card"><div style="color:var(--muted);text-align:center;padding:2rem">Les classements seront disponibles après la première synchronisation automatique.<br><br>Lance le workflow GitHub Actions pour démarrer.</div></div>`;
    return;
  }

  el.innerHTML = keys.map(cat => {
    const assocs = cats[cat]?.associations || {};
    const assocKeys = Object.keys(assocs);
    if (!assocKeys.length) return '';

    return `
      <div style="margin-bottom:2rem">
        <h3 style="font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem;color:var(--gold)">${cat}</h3>
        <div class="grid-2">
          ${assocKeys.map(assoc => {
            const standings = assocs[assoc]?.standings?.standings || [];
            if (!standings.length) return '';
            return `
              <div class="card">
                <div class="card-title" style="margin-bottom:1rem;font-size:1rem">${assoc.replace(/-/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</div>
                <table class="stats-table">
                  <thead><tr>${Object.keys(standings[0]||{}).slice(0,6).map(k=>`<th>${k}</th>`).join('')}</tr></thead>
                  <tbody>
                    ${standings.slice(0,8).map(row => {
                      const isAnjou = JSON.stringify(row).toLowerCase().includes('anjou');
                      return `<tr class="${isAnjou?'ahm-row':''}">${Object.values(row).slice(0,6).map(v=>`<td>${v}</td>`).join('')}</tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════

function formatDate(d) {
  if (!d) return '—';
  try {
    return new Date(d + 'T12:00:00').toLocaleDateString('fr-CA', { weekday:'short', day:'numeric', month:'long' });
  } catch { return d; }
}

function priorityLabel(p) {
  return { haute: '🔴 Priorité haute', moyenne: '🟡 Priorité moyenne', basse: '🟢 Priorité basse' }[p] || p;
}

function infoBox(title, content) {
  if (!content) return '';
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem">
    <div style="font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem">${title}</div>
    <p style="font-size:.85rem;line-height:1.5;color:#c0cce0">${content}</p>
  </div>`;
}

function emptyState(msg) {
  return `<div class="empty"><div class="empty-icon">🏒</div><p>${msg}</p></div>`;
}

function showOpponent(name, cat) {
  showSection('opponents');
  document.querySelectorAll('.nav-tab').forEach((t,i) => t.classList.toggle('active', i===3));
  renderOpponents(cat);
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════

function renderAll() {
  renderOverview();
  buildCatFilter('schedule-filter',  f => renderSchedule(f));
  buildCatFilter('strat-filter',     f => renderStrategies(f));
  buildCatFilter('opp-filter',       f => renderOpponents(f));
  buildCatFilter('standing-filter',  f => renderStandings(f));
  renderSchedule();
  renderStrategies();
  renderOpponents();
  renderStandings();
}

// Close modal on backdrop click
document.getElementById('strategy-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadData();
</script>
